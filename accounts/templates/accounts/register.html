<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-5">

            <div class="card shadow-lg p-4">

                <h2 class="text-center mb-4">
                    Register
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text"
                               name="username"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               required>
                    </div>

                    
                    <button type="submit"
                            class="btn btn-success w-100">
                        Register
                    </button>

                </form>

                <hr>

                <p class="text-center">
                    Already have an account?
                    <a href="{% url 'login' %}">
                        Login Here
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
