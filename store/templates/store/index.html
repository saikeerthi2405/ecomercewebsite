<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My E-Commerce Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🛒 E-Commerce</a>

        <div class="ms-auto">

            {% if user.is_authenticated %}
                <span class="text-white me-3">
                    Welcome, {{ user.username }}
                </span>

                <a href="{% url 'cart' %}" class="btn btn-warning me-3">
                    Cart
                </a>

                <a href="{% url 'logout' %}" class="btn btn-danger">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-success me-2">
                    Login
                </a>

                <a href="{% url 'register' %}" class="btn btn-primary">
                    Register
                </a>

            {% endif %}

        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Our Products</h2>

    <div class="row">

        {% for product in products %}

        <div class="col-md-4 mb-4">

            <div class="card shadow">

                
                {% if product.image %}
                <img src="{{ product.image.url }}"
                     class="card-img-top"
                     style="height:250px;object-fit:center;background:#f8f9fa">
                {% endif %}

                <div class="card-body">

                    <h5>{{ product.name }}</h5>

                    <h4 class="text-success">
                        ₹{{ product.price }}
                    </h4>

                    <a href="{% url 'product_detail' product.id %}"
                       class="btn btn-primary w-100">
                        View Details
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 My E-Commerce Store
</footer>

</body>
</html>
