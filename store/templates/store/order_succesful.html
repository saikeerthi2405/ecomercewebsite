<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            margin-top:100px;
        }

        .box{
            background:white;
            width:450px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:green;
        }

        p{
            font-size:18px;
        }

        .btn{
            background:green;
            color:white;
            padding:12px 20px;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:darkgreen;
        }
    </style>

</head>
<body>

<div class="box">

    <h1>🎉 Order Placed Successfully!</h1>

    <p>Thank you for shopping with us.</p>

    <p>Your order has been placed successfully.</p>

    <br>

    <a href="{% url 'home' %}" class="btn">
        Continue Shopping
    </a>
     

</div>

</body>
</html>
